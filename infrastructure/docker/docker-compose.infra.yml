# STANDALONE INFRASTRUCTURE ONLY
# Use ONLY for testing infra without app services
# DO NOT run simultaneously with docker-compose.yml
# Both files define MySQL on port 3306 — conflict if run together
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: factoryops_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: energy_device_db
    ports:
      - "3306:3306"
    volumes:
      - ../mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factoryops_network

  influxdb:
    image: influxdb:2.7
    container_name: factoryops_influxdb
    environment:
      INFLUXDB_INIT_MODE: setup
      INFLUXDB_INIT_ORG: factoryops
      INFLUXDB_INIT_BUCKET: telemetry
      INFLUXDB_INIT_RETENTION: 90d
      INFLUXDB_INIT_ADMIN_TOKEN: factoryops-admin-token
      INFLUXDB_INIT_USERNAME: admin
      INFLUXDB_INIT_PASSWORD: adminpassword
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "influxd", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factoryops_network

  redis:
    image: redis:7-alpine
    container_name: factoryops_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factoryops_network

  emqx:
    image: emqx:5.3
    container_name: factoryops_emqx
    environment:
      EMQX_NODE_NAME: emqx@localhost
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WebSocket
      - "18083:18083" # Dashboard
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factoryops_network

  minio:
    image: minio/minio:latest
    container_name: factoryops_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factoryops_network

volumes:
  mysql_data:
  influxdb_data:
  minio_data:

networks:
  factoryops_network:
    driver: bridge
